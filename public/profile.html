<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - L0Ks</title>
    <link rel="icon" href="data:image/svg+xml,...👤</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root { --bg-start: #0a0a1a; --accent: #e94560; --text: #e0e0e0; --card-bg: rgba(22,33,62,0.85); }
        body { font-family: 'Segoe UI','微软雅黑',sans-serif; background: linear-gradient(135deg, var(--bg-start), #1a1a3e); color: var(--text); padding: 20px; max-width: 700px; margin: 0 auto; }
        .back-link { color: var(--accent); text-decoration: none; }
        .section { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 16px; padding: 20px; margin: 20px 0; }
        .section h3 { margin: 0 0 16px; }
        .avatar-container { text-align: center; }
        .avatar-container img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
        input, button { padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.35); color: white; font-size: 0.95rem; margin: 6px 0; width: 100%; box-sizing: border-box; }
        input::placeholder { color: #888; }
        button { background: var(--accent); cursor: pointer; font-weight: 600; transition: transform 0.2s; }
        button:hover { transform: scale(1.02); }
        .msg { font-size: 0.85rem; margin-top: 6px; }
        .flex-row { display: flex; gap: 10px; } .flex-row input { flex: 1; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <a href="/L0Ks.html" class="back-link">← 返回首页</a>
    <h1>👤 个人中心</h1>

    <!-- 头像 -->
    <div class="section avatar-container">
        <img id="avatarImg" src="data:image/svg+xml,...👤</text></svg>" alt="头像">
        <div>
            <input type="file" id="avatarFile" accept="image/*" class="hidden">
            <button onclick="document.getElementById('avatarFile').click()">更换头像</button>
        </div>
    </div>

    <!-- 昵称 -->
    <div class="section">
        <h3>✏️ 修改昵称</h3>
        <div class="flex-row">
            <input type="text" id="nicknameInput" placeholder="新昵称">
            <button onclick="updateNickname()">保存</button>
        </div>
        <div class="msg" id="nicknameMsg"></div>
    </div>

    <!-- 密码 -->
    <div class="section">
        <h3>🔐 修改密码</h3>
        <input type="password" id="oldPassword" placeholder="旧密码">
        <input type="password" id="newPassword" placeholder="新密码">
        <button onclick="updatePassword()">修改密码</button>
        <div class="msg" id="passwordMsg"></div>
    </div>

    <!-- 我的视频 -->
    <div class="section">
        <h3>📹 我上传的视频</h3>
        <div id="myVideos"></div>
    </div>

    <script>
        function getCsrfToken() { var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/); return m ? m[1] : ''; }
        async function init() {
            var userResp = await fetch('/api/user'), userData = await userResp.json();
            if (!userData.username) { document.body.innerHTML = '<h2>请先登录</h2>'; return; }
            var profileResp = await fetch('/api/profile'), profile = await profileResp.json();
            if (profile.avatar) document.getElementById('avatarImg').src = profile.avatar;
            document.getElementById('nicknameInput').value = profile.nickname || '';
            var videosResp = await fetch('/api/videos'), videos = await videosResp.json();
            var myVideos = videos.filter(v => v.uploaded_by === userData.username);
            var container = document.getElementById('myVideos');
            container.innerHTML = myVideos.length === 0 ? '<p>你还没有上传过视频</p>' :
                myVideos.map(v => `<div style="background:rgba(0,0,0,0.3); padding:10px; margin:8px 0; border-radius:8px; display:flex; justify-content:space-between;"><span>${v.title}</span><button style="width:auto; padding:4px 12px;" onclick="deleteMyVideo(${v.id})">删除</button></div>`).join('');
        }
        async function deleteMyVideo(id) {
            if (!confirm('确定删除？')) return;
            await fetch('/api/videos/' + id + '/delete', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ _csrf: getCsrfToken() }).toString() });
            init();
        }
        async function updateNickname() {
            var resp = await fetch('/api/profile/nickname', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ nickname: document.getElementById('nicknameInput').value, _csrf: getCsrfToken() }).toString() });
            document.getElementById('nicknameMsg').textContent = await resp.text();
        }
        document.getElementById('avatarFile').addEventListener('change', async function() {
            var file = this.files[0]; if (!file) return;
            var formData = new FormData(); formData.append('avatar', file); formData.append('_csrf', getCsrfToken());
            var resp = await fetch('/api/profile/avatar', { method: 'POST', body: formData });
            if (resp.ok) { var p = await (await fetch('/api/profile')).json(); if (p.avatar) document.getElementById('avatarImg').src = p.avatar + '?' + Date.now(); }
            alert(await resp.text());
        });
        async function updatePassword() {
            var resp = await fetch('/api/profile/password', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ oldPassword: document.getElementById('oldPassword').value, newPassword: document.getElementById('newPassword').value, _csrf: getCsrfToken() }).toString() });
            document.getElementById('passwordMsg').textContent = await resp.text();
        }
        init();
    </script>
</body>
</html>
