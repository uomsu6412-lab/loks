<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎬 L0Ks - 私人番剧站</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
    <style>
        :root {
            --bg-start: #0a0a1a; --bg-end: #1a1a3e;
            --card-bg: rgba(22, 33, 62, 0.85);
            --accent: #e94560; --accent2: #8b5cf6;
            --text: #e0e0e0; --text-secondary: #a0a0b0;
            --nav-bg: rgba(10, 10, 26, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text); min-height: 100vh; overflow-x: hidden; position: relative;
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; border-radius: 50%; background: rgba(233,69,96,0.4); animation: float linear infinite; }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            color: white; padding: 12px 24px; border-radius: 30px;
            font-size: 0.9rem; animation: toastIn 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2); max-width: 300px; word-break: break-word;
        }
        .toast.success { border-color: #00b894; }
        .toast.error { border-color: #e94560; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .skeleton-card {
            background: var(--card-bg); border-radius: 20px; padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: pulse 1.5s infinite;
        }
        .skeleton-thumb {
            width: 100%; aspect-ratio: 16/9; background: rgba(255,255,255,0.05);
            border-radius: 12px; margin-bottom: 12px;
        }
        .skeleton-text { height: 16px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; width: 60%; }
        .skeleton-text.short { width: 40%; }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--nav-bg); backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap; gap: 10px;
        }
        .navbar-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .navbar-left .avatar-img {
            width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .navbar-left .avatar-placeholder {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.2); display: inline-flex;
            align-items: center; justify-content: center; font-size: 1rem;
        }
        .navbar-logo {
            font-size: 1.5rem; font-weight: bold;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-user { font-size: 0.9rem; color: var(--text-secondary); }
        .navbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .search-box { display: flex; align-items: center; gap: 6px; }
        .search-box input {
            width: 160px; padding: 8px 14px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4);
            color: white; font-size: 0.9rem; outline: none;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: #888; }
        .search-box button, .navbar select, .btn {
            padding: 8px 16px; border-radius: 20px;
            background: rgba(0,0,0,0.4); color: white;
            border: 1px solid rgba(255,255,255,0.15); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: transform 0.2s; outline: none;
        }
        .search-box button { background: var(--accent); border: none; }
        .search-box button:hover, .navbar select:hover, .btn:hover { transform: scale(1.05); }
        .btn-auth { background: linear-gradient(135deg, var(--accent), #c0392b); }
        .btn-upload-nav { background: linear-gradient(135deg, #00b894, #0984e3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .main-content { position: relative; z-index: 1; padding: 20px 24px 60px; }
        .section-title { font-size: 1.5rem; margin: 0 0 20px; color: var(--text); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 16px; cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
            transition: all 0.3s ease; display: flex; flex-direction: column;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(233,69,96,0.3);
        }
        .card video, .card img {
            width: 100%; border-radius: 12px; margin-bottom: 12px;
            background: #000; aspect-ratio: 16/9; object-fit: cover;
        }
        .card h3 { font-size: 1.1rem; margin: 0 0 6px; color: white; }
        .card .meta { font-size: 0.8rem; color: var(--text-secondary); margin-top: auto; }
        .card .delete-btn {
            background: #e94560; color: white; border: none;
            padding: 4px 12px; border-radius: 15px; font-size: 0.8rem;
            cursor: pointer; margin-top: 8px; z-index: 2; position: relative;
        }
        .card .delete-btn:hover { transform: scale(1.05); }

        .modal {
            display: none; position: fixed; z-index: 200; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px); justify-content: center; align-items: center;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 30px; width: 100%; max-width: 400px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6); color: white;
        }
        .modal-content h3 { margin-bottom: 16px; font-size: 1.3rem; }
        .modal-content input, .modal-content select {
            display: block; width: 100%; margin: 8px 0 16px;
            padding: 10px 14px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.35);
            color: white; font-size: 0.95rem;
        }
        .modal-content input::placeholder { color: #888; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-actions button {
            padding: 8px 20px; border-radius: 20px; border: none;
            cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: transform 0.2s;
        }
        .modal-actions button:hover { transform: scale(1.05); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
        .tabs {
            display: flex; gap: 12px; margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;
        }
        .tabs span {
            cursor: pointer; font-weight: 600; color: var(--text-secondary);
            padding-bottom: 4px; transition: color 0.2s;
        }
        .tabs span.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.6; }

        /* 手机端优化：强制视频内联播放、防止覆盖UI */
        @media (max-width: 768px) {
            .navbar { padding: 8px 12px; gap: 6px; }
            .navbar-left { gap: 6px; }
            .navbar-left .avatar-img, .navbar-left .avatar-placeholder { width: 28px; height: 28px; }
            .navbar-logo { font-size: 1.2rem; }
            .navbar-user { font-size: 0.75rem; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .navbar-right { gap: 4px; }
            .search-box input { width: 90px; padding: 6px 10px; font-size: 0.75rem; }
            .search-box button, .navbar select, .btn { padding: 6px 10px; font-size: 0.7rem; border-radius: 15px; }
            .card-grid { grid-template-columns: 1fr; gap: 16px; padding: 0 12px; }
            .main-content { padding: 15px 8px 40px; }
            .section-title { font-size: 1.2rem; margin-bottom: 12px; }
            .modal-content { margin: 0 16px; padding: 20px; }
            .toast-container { top: 10px; right: 10px; left: 10px; }
            .toast { font-size: 0.8rem; padding: 10px 18px; max-width: 100%; }
            /* 确保视频在小屏幕上内联播放 */
            video {
                -webkit-playsinline: true;
                playsinline: true;
                x5-playsinline: true;
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="particles" id="particles"></div>

    <nav class="navbar">
        <div class="navbar-left" onclick="window.location.href='/profile.html'">
            <img id="navbarAvatar" class="avatar-img" src="" alt="头像" style="display: none;">
            <span id="navbarAvatarPlaceholder" class="avatar-placeholder">👤</span>
            <span class="navbar-logo">🎬 L0Ks</span>
            <span class="navbar-user" id="navbarUser">未登录</span>
        </div>
        <div class="navbar-right">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索视频...">
                <button id="searchBtn">搜索</button>
            </div>
            <select id="categoryFilter">
                <option value="全部">全部分类</option>
                <option value="动漫">动漫</option>
                <option value="电影">电影</option>
                <option value="电视剧">电视剧</option>
                <option value="其他">其他</option>
            </select>
            <button id="btnAuth" class="btn btn-auth">登录 / 注册</button>
            <button id="btnUploadNav" class="btn btn-upload-nav" style="display: none;">📤 上传</button>
        </div>
    </nav>

    <div class="main-content">
        <div id="continueWatchingSection" style="display: none;">
            <div class="section-title">⏳ 继续观看</div>
            <div class="card-grid" id="continueWatchingContainer"></div>
        </div>
        <div class="section-title">📺 番剧列表</div>
        <div class="card-grid" id="videoContainer">
            <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
            <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
            <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="tabs">
                <span class="active" data-tab="login">登录</span>
                <span data-tab="register">注册</span>
            </div>
            <div class="form-panel active" id="loginPanel">
                <form id="loginForm">
                    <input type="hidden" id="csrfInputLogin" name="_csrf">
                    <input id="loginUsername" placeholder="用户名">
                    <input id="loginPassword" type="password" placeholder="密码">
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeAuthModal()">取消</button>
                        <button type="submit" class="btn-primary">登录</button>
                    </div>
                </form>
                <div id="loginMsg" style="margin-top: 10px;"></div>
            </div>
            <div class="form-panel" id="registerPanel">
                <form id="registerForm">
                    <input type="hidden" id="csrfInputReg" name="_csrf">
                    <input id="regUsername" placeholder="用户名">
                    <input id="regPassword" type="password" placeholder="密码">
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeAuthModal()">取消</button>
                        <button type="submit" class="btn-primary">注册</button>
                    </div>
                </form>
                <div id="registerMsg" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <h3>📤 分享片源</h3>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="hidden" id="csrfInputUpload" name="_csrf">
                <input id="videoTitle" name="title" placeholder="片名">
                <select id="videoCategory" name="category">
                    <option value="动漫">动漫</option>
                    <option value="电影">电影</option>
                    <option value="电视剧">电视剧</option>
                    <option value="其他">其他</option>
                </select>
                <input type="file" id="videoFile" name="videos" accept="video/*" multiple capture="environment">
                <span id="videoDuration" style="color: #a0a0b0; font-size: 0.85rem;"></span>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeUploadModal()">取消</button>
                    <button type="submit" class="btn-primary" id="uploadSubmitBtn">上传</button>
                </div>
            </form>
            <div id="uploadMsg" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 2500);
        }

        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
                p.style.animationDuration = Math.random() * 20 + 15 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        })();

        function getCsrfToken() {
            var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
            return match ? match[1] : '';
        }
        function fillCsrf() {
            var token = getCsrfToken();
            document.getElementById('csrfInputLogin').value = token;
            document.getElementById('csrfInputReg').value = token;
            document.getElementById('csrfInputUpload').value = token;
        }

        const authModal = document.getElementById('authModal');
        const uploadModal = document.getElementById('uploadModal');
        function openAuthModal() { authModal.classList.add('open'); fillCsrf(); }
        function closeAuthModal() { authModal.classList.remove('open'); }
        function openUploadModal() { uploadModal.classList.add('open'); fillCsrf(); }
        function closeUploadModal() { uploadModal.classList.remove('open'); }
        window.addEventListener('click', function(e) {
            if (e.target === authModal) closeAuthModal();
            if (e.target === uploadModal) closeUploadModal();
        });

        document.querySelectorAll('.tabs span').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tabs span').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                document.getElementById('loginPanel').classList.remove('active');
                document.getElementById('registerPanel').classList.remove('active');
                if (target === 'login') document.getElementById('loginPanel').classList.add('active');
                else document.getElementById('registerPanel').classList.add('active');
            });
        });

        window.addEventListener('DOMContentLoaded', function() { fillCsrf(); checkLogin(); loadVideos(); loadContinueWatching(); });

        async function checkLogin() {
            var response = await fetch('/api/user');
            var data = await response.json();
            var navbarUser = document.getElementById('navbarUser');
            var btnAuth = document.getElementById('btnAuth');
            var btnUploadNav = document.getElementById('btnUploadNav');
            var avatarImg = document.getElementById('navbarAvatar');
            var avatarPlaceholder = document.getElementById('navbarAvatarPlaceholder');

            if (data.username) {
                window.currentUser = data.username;
                navbarUser.textContent = data.username;
                btnAuth.style.display = 'none';
                btnUploadNav.style.display = 'inline-block';
                try {
                    var profileResp = await fetch('/api/profile');
                    var profile = await profileResp.json();
                    if (profile.avatar) {
                        avatarImg.src = profile.avatar;
                        avatarImg.style.display = 'inline-block';
                        avatarPlaceholder.style.display = 'none';
                    } else {
                        avatarImg.style.display = 'none';
                        avatarPlaceholder.style.display = 'inline-block';
                    }
                } catch (e) {
                    avatarImg.style.display = 'none';
                    avatarPlaceholder.style.display = 'inline-block';
                }
            } else {
                window.currentUser = null;
                navbarUser.textContent = '未登录';
                btnAuth.style.display = 'inline-block';
                btnUploadNav.style.display = 'none';
                avatarImg.style.display = 'none';
                avatarPlaceholder.style.display = 'inline-block';
            }
        }

        async function loadVideos(category) {
            var url = '/api/videos';
            if (category && category !== '全部') url += '?category=' + encodeURIComponent(category);
            var response = await fetch(url);
            var videos = await response.json();
            var container = document.getElementById('videoContainer');
            container.innerHTML = '';
            if (videos.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p>还没有人分享片源，成为第一个吧！</p>
                </div>`;
                return;
            }
            videos.forEach(function(v) {
                var card = document.createElement('div'); card.className = 'card';
                var isOwner = (window.currentUser && v.uploaded_by === window.currentUser);
                var deleteBtnHtml = isOwner ? '<button class="delete-btn">🗑 删除</button>' : '';
                var optimizedUrl = v.filename.replace('/upload/', '/upload/f_mp4,q_auto/');
                card.innerHTML = '<video controls playsinline src="' + optimizedUrl + '" poster="' + (v.thumbnail || '') + '"></video>' +
                                 '<h3>' + v.title + '</h3><div class="meta">上传者：' + v.uploaded_by + ' | 分类：' + (v.category || '其他') + '</div>' + deleteBtnHtml;
                card.addEventListener('click', function(e) {
                    if (e.target.closest('.delete-btn')) { e.preventDefault(); deleteVideo(v.id); }
                    else { window.location.href = '/video.html?id=' + v.id; }
                });
                container.appendChild(card);
            });
        }

        function loadContinueWatching() {
            const container = document.getElementById('continueWatchingContainer');
            const section = document.getElementById('continueWatchingSection');
            container.innerHTML = '';
            const historyItems = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('l0ks_video_')) {
                    const videoId = key.replace('l0ks_video_', '');
                    const savedTime = parseFloat(localStorage.getItem(key));
                    if (savedTime > 5) historyItems.push({ id: videoId, time: savedTime });
                }
            }
            if (historyItems.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            historyItems.forEach(async function(item) {
                try {
                    const resp = await fetch('/api/videos/' + item.id);
                    if (!resp.ok) return;
                    const video = await resp.json();
                    const card = document.createElement('div'); card.className = 'card';
                    const mins = Math.floor(item.time / 60), secs = Math.floor(item.time % 60);
                    card.innerHTML = `<video controls playsinline src="${video.filename.replace('/upload/', '/upload/f_mp4,q_auto/')}" poster="${video.thumbnail || ''}" style="pointer-events:none;"></video><h3>${video.title}</h3><div class="meta">继续从 ${mins}分${secs}秒 观看</div>`;
                    card.addEventListener('click', function() { window.location.href = '/video.html?id=' + video.id; });
                    container.appendChild(card);
                } catch (err) { localStorage.removeItem('l0ks_video_' + item.id); }
            });
        }

        async function deleteVideo(id) {
            if (!confirm('确定删除？')) return;
            var resp = await fetch('/api/videos/' + id + '/delete', {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ _csrf: getCsrfToken() }).toString()
            });
            if (resp.ok) { showToast('删除成功'); loadVideos(document.getElementById('categoryFilter').value); }
            else showToast('删除失败：' + await resp.text(), 'error');
        }

        document.getElementById('searchBtn').addEventListener('click', () => loadVideos(document.getElementById('categoryFilter').value));
        document.getElementById('categoryFilter').addEventListener('change', function() { loadVideos(this.value); });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var resp = await fetch('/login', {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username: document.getElementById('loginUsername').value, password: document.getElementById('loginPassword').value, _csrf: getCsrfToken() }).toString()
            });
            var msg = await resp.text();
            document.getElementById('loginMsg').textContent = msg;
            if (msg === '登录成功！') { showToast('登录成功'); closeAuthModal(); checkLogin(); loadVideos(); }
            else showToast(msg, 'error');
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var resp = await fetch('/register', {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username: document.getElementById('regUsername').value, password: document.getElementById('regPassword').value, _csrf: getCsrfToken() }).toString()
            });
            var msg = await resp.text();
            document.getElementById('registerMsg').textContent = msg;
            if (msg === '注册成功！') { showToast('注册成功，请登录'); document.querySelector('.tabs span[data-tab="login"]').click(); }
            else showToast(msg, 'error');
        });

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var files = document.getElementById('videoFile').files;
            if (files.length === 0) return;
            var title = document.getElementById('videoTitle').value;
            var category = document.getElementById('videoCategory').value;
            var csrfToken = document.getElementById('csrfInputUpload').value;
            var submitBtn = document.getElementById('uploadSubmitBtn');
            submitBtn.disabled = true; submitBtn.textContent = '上传中...';
            for (var i = 0; i < files.length; i++) {
                var formData = new FormData();
                formData.append('title', title ? title + ' (' + (i+1) + '/' + files.length + ')' : '视频 ' + (i+1));
                formData.append('category', category);
                formData.append('video', files[i]);
                formData.append('_csrf', csrfToken);
                await fetch('/api/upload', { method: 'POST', body: formData });
            }
            submitBtn.disabled = false; submitBtn.textContent = '上传';
            showToast('上传完成'); window.location.href = '/L0Ks.html';
        });

        document.getElementById('videoFile').addEventListener('change', function() {
            var file = this.files[0]; if (!file) return;
            var v = document.createElement('video'); v.preload = 'metadata';
            v.onloadedmetadata = function() {
                var m = Math.floor(v.duration / 60), s = Math.round(v.duration % 60);
                document.getElementById('videoDuration').textContent = '时长：' + m + '分' + s + '秒';
                URL.revokeObjectURL(v.src);
            };
            v.src = URL.createObjectURL(file);
        });

        document.getElementById('btnAuth').addEventListener('click', openAuthModal);
        document.getElementById('btnUploadNav').addEventListener('click', openUploadModal);
    </script>
</body>
</html>
