<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 L0Ks - 私人番剧站</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        :root {
            --bg-start: #0a0a1a;
            --bg-end: #1a1a3e;
            --card-bg: rgba(22, 33, 62, 0.85);
            --accent: #e94560;
            --accent2: #8b5cf6;
            --text: #e0e0e0;
            --text-secondary: #a0a0b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }
        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.4);
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 30px 0 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 1;
        }
        .user-area {
            margin: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            z-index: 1;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            padding: 20px 30px;
            z-index: 1;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(233,69,96,0.3);
        }
        .card video, .card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            background: #000;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .card h3 {
            font-size: 1.1rem;
            margin: 0 0 6px;
            color: white;
        }
        .card .meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: auto;
        }

        .form-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            margin: 30px auto;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 1;
            text-align: left;
        }
        .form-box h3 {
            margin: 0 0 12px;
            font-size: 1.2rem;
            color: white;
        }
        .form-box input {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.35);
            color: white;
            font-size: 0.95rem;
        }
        .form-box input::placeholder { color: #888; }

        button, .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-login { background: linear-gradient(135deg, var(--accent), #c0392b); }
        .btn-register { background: linear-gradient(135deg, var(--accent2), #6c5ce7); }
        .btn-upload { background: linear-gradient(135deg, #00b894, #0984e3); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            z-index: 1;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>

    <h1>🎬 L0Ks</h1>
    <div class="user-area" id="userArea">未登录</div>

    <div class="card-container" id="videoContainer">
        <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p>还没有人分享片源，成为第一个吧！</p>
        </div>
    </div>

    <div class="form-box" id="uploadBox" style="display: none;">
        <h3>📤 分享片源</h3>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="hidden" id="csrfInputUpload" name="_csrf">
            <input id="videoTitle" name="title" placeholder="片名">
            <input type="file" id="videoFile" name="video" accept="video/*">
            <button type="submit" class="btn-upload">上传</button>
        </form>
        <div id="uploadMsg" style="margin-top: 10px;"></div>
    </div>

    <div class="form-box" id="authBox">
        <h3>🔐 用户登录</h3>
        <form id="loginForm">
            <input type="hidden" id="csrfInputLogin" name="_csrf">
            <input id="loginUsername" placeholder="用户名">
            <input id="loginPassword" type="password" placeholder="密码">
            <button type="submit" class="btn-login">登录</button>
        </form>
        <div id="loginMsg" style="margin-top: 10px;"></div>

        <h3 style="margin-top: 24px;">📝 注册新用户</h3>
        <form id="registerForm">
            <input type="hidden" id="csrfInputReg" name="_csrf">
            <input id="regUsername" placeholder="用户名">
            <input id="regPassword" type="password" placeholder="密码">
            <button type="submit" class="btn-register">注册</button>
        </form>
        <div id="registerMsg" style="margin-top: 10px;"></div>
    </div>

    <script>
        // 粒子动画
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
                p.style.animationDuration = Math.random() * 20 + 15 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        })();

        // ========== 原有功能代码（与之前一致，未修改） ==========
        function getCsrfToken() {
            var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
            return match ? match[1] : '';
        }
        function fillCsrf() {
            var token = getCsrfToken();
            document.getElementById('csrfInputLogin').value = token;
            document.getElementById('csrfInputReg').value = token;
            document.getElementById('csrfInputUpload').value = token;
        }
        window.addEventListener('DOMContentLoaded', function() {
            fillCsrf();
            checkLogin();
            loadVideos();
        });
        async function checkLogin() {
            var response = await fetch('/api/user');
            var data = await response.json();
            if (data.username) {
                document.getElementById('userArea').textContent = '👤 ' + data.username + ' 已登录';
                document.getElementById('uploadBox').style.display = 'block';
                document.getElementById('authBox').style.display = 'none';
            } else {
                document.getElementById('userArea').textContent = '未登录';
                document.getElementById('uploadBox').style.display = 'none';
                document.getElementById('authBox').style.display = 'block';
            }
        }
        async function loadVideos() {
            var response = await fetch('/api/videos');
            var videos = await response.json();
            var container = document.getElementById('videoContainer');
            container.innerHTML = '';
            if (videos.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p>还没有人分享片源，成为第一个吧！</p>
                </div>`;
                return;
            }
            videos.forEach(function(v) {
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<video controls src="' + v.filename + '" poster="' + (v.thumbnail || '') + '"></video>' +
                                 '<h3>' + v.title + '</h3>' +
                                 '<div class="meta">上传者：' + v.uploaded_by + '</div>';
                container.appendChild(card);
            });
        }
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var username = document.getElementById('loginUsername').value;
            var password = document.getElementById('loginPassword').value;
            var csrfToken = document.getElementById('csrfInputLogin').value;
            var response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username, password, _csrf: csrfToken }).toString()
            });
            document.getElementById('loginMsg').textContent = await response.text();
            if (response.ok) { checkLogin(); loadVideos(); }
        });
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var username = document.getElementById('regUsername').value;
            var password = document.getElementById('regPassword').value;
            var csrfToken = document.getElementById('csrfInputReg').value;
            var response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username, password, _csrf: csrfToken }).toString()
            });
            document.getElementById('registerMsg').textContent = await response.text();
        });
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var formData = new FormData();
            formData.append('title', document.getElementById('videoTitle').value);
            formData.append('video', document.getElementById('videoFile').files[0]);
            formData.append('_csrf', document.getElementById('csrfInputUpload').value);
            var response = await fetch('/api/upload', { method: 'POST', body: formData });
            if (response.redirected) {
                window.location.href = response.url;
            } else {
                document.getElementById('uploadMsg').textContent = await response.text();
            }
        });
    </script>
</body>
</html>
